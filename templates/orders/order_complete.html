{% extends 'base.html' %}
{% block content %}
<section class="section-content" style="padding: 2rem 0;">
    <div class="card"
        style="background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); padding: 2.5rem; max-width: 600px; margin: 0 auto; text-align: center;">
        <h2 style="font-size: 1.8rem; margin-bottom: 1rem; color: var(--text-main);">Order Placed Successfully!</h2>
        <p style="margin-bottom: 1.5rem; color: var(--text-muted);">Thank you for your purchase. Your order has been
            received and is being processed.</p>
        <a href="{% url 'store' %}" class="btn btn-primary" style="padding: 0.75rem 1.5rem; font-size: 1rem;">Continue
            Shopping</a>
        <a href="{% url 'order_history' %}" class="btn btn-outline"
            style="margin-left: 1rem; padding: 0.75rem 1.5rem; font-size: 1rem;">View Order History</a>
    </div>
</section>
{% endblock %}
