{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="section-content padding-y"
    style="display: flex; justify-content: center; align-items: flex-start; padding: 4rem 0; min-height: 70vh;">
    <div class="card"
        style="background: var(--bg-card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); padding: 2.5rem; width: 100%; max-width: 500px;">
        <h2 style="font-size: 1.75rem; font-weight: 700; margin-bottom: 2rem; text-align: center;">Sign In</h2>

        <form action="{% url 'login' %}" method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" class="form-control" name="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" class="form-control" name="password" id="password"
                    placeholder="Enter your password" required>
            </div>

            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.875rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" style="color: var(--primary-color);">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; font-size: 1.1rem; padding: 0.875rem;">Login</button>
        </form>

        <div style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
            Don't have an account? <a href="{% url 'register' %}"
                style="color: var(--primary-color); font-weight: 600;">Sign up Let's go</a>
        </div>
    </div>
</section>
{% endblock %}
