{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="section-content padding-y"
    style="display: flex; justify-content: center; align-items: flex-start; padding: 4rem 0; min-height: 70vh;">
    <div class="card"
        style="background: white; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); padding: 2.5rem; width: 100%; max-width: 600px;">
        <h2 style="font-size: 1.75rem; font-weight: 700; margin-bottom: 2rem; text-align: center;">Create an Account
        </h2>

        <form action="{% url 'register' %}" method="POST">
            {% csrf_token %}

            <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label class="form-label" for="first_name">First Name</label>
                    <input type="text" class="form-control" name="first_name" id="first_name" required>
                </div>
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label class="form-label" for="last_name">Last Name</label>
                    <input type="text" class="form-control" name="last_name" id="last_name" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" class="form-control" name="email" id="email" placeholder="you@example.com" required>
            </div>

            <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" class="form-control" name="password" id="password" required>
                </div>
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label class="form-label" for="confirm_password">Confirm Password</label>
                    <input type="password" class="form-control" name="confirm_password" id="confirm_password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; font-size: 1.1rem; padding: 0.875rem; margin-top: 1rem;">Register</button>
        </form>

        <div style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
            Already have an account? <a href="{% url 'login' %}"
                style="color: var(--primary-color); font-weight: 600;">Log in</a>
        </div>
    </div>
</section>
{% endblock %}
